<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 320px; 
      padding: 0; 
      margin: 0; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fff;
    }
    .view { display: none; }
    .view.active { display: block; }
    
    h3 { 
      margin: 0; 
      padding: 16px;
      font-size: 16px; 
      color: #333;
      font-weight: 600;
      border-bottom: 1px solid #f0f0f0;
    }
    
    /* 操作视图 */
    #view-action {
      padding: 16px;
    }
    #btn-area {
      width: 100%; 
      padding: 12px; 
      margin-top: 12px;
      border: 1px solid #e0e0e0; 
      border-radius: 8px; 
      cursor: pointer;
      font-size: 14px; 
      background: #f5f5f5;
      color: #333;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    #btn-area:hover { 
      background: #e8e8e8; 
      border-color: #d0d0d0;
    }
    .tip { 
      font-size: 12px; 
      color: #888; 
      margin-top: 12px; 
      line-height: 1.5; 
      padding: 8px 12px;
      background: #fafafa;
      border-radius: 6px;
    }
    
    /* 结果视图 */
    #view-result {
      padding: 16px;
    }
    .result-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .result-icon {
      width: 28px; 
      height: 28px; 
      border-radius: 50%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 16px; 
      color: white;
      background: #07c160;
      flex-shrink: 0;
    }
    .result-icon.error {
      background: #ff4d4f;
    }
    .result-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
    }
    
    .result-content {
      background: #f6f6f6;
      border-radius: 8px;
      padding: 12px;
      word-break: break-all;
      color: #333;
      font-size: 13px;
      line-height: 1.6;
      max-height: 180px;
      overflow-y: auto;
      border: 1px solid #e8e8e8;
    }
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
    }
    .btn-row {
      display: flex;
      gap: 8px;
    }
    button {
      padding: 10px 0; 
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.2s;
      font-weight: 500;
    }
    button:hover { opacity: 0.85; }
    .btn-primary {
      background: #07c160;
      color: white;
      flex: 1;
    }
    .btn-secondary {
      background: #f0f0f0;
 
      color: #666;
      flex: 1;
    }
    .btn-link {
      background: #1677ff;
      color: white;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      text-decoration: none;
    }
    .hidden { display: none !important; }
    
    .toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 10000;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <!-- 操作视图 -->
  <div id="view-action" class="view active">
    <h3>二维码识别</h3>
    <button id="btn-area">
      <span>⬚</span>
      <span>框选区域识别</span>
    </button>
    <div class="tip">在页面拖拽鼠标框选二维码区域<br>按 ESC 取消</div>
  </div>

  <!-- 结果视图 -->
  <div id="view-result" class="view">
    <div class="result-header">
      <div class="result-icon" id="result-icon">✓</div>
      <span class="result-title" id="result-title">识别成功</span>
    </div>
    <div class="result-content" id="result-content"></div>
    <div class="btn-group">
      <a class="btn-link hidden" id="btn-open" target="_blank">
        <span>🔗</span>
        <span>打开链接</span>
      </a>
      <div class="btn-row">
        <button class="btn-primary" id="btn-copy">📋 复制结果</button>
        <button class="btn-secondary" id="btn-back">↩ 返回</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">已复制到剪贴板</div>

  <script src="popup.js"></script>
</body>
</html>
