name: 清理旧的部署记录

on:
  # 正确写法：page_build 不需要 types
  page_build:
  
  # 手动触发（可选）
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  clean-deployments:
    runs-on: ubuntu-latest
    steps:
      - name: 获取所有部署记录
        id: get-deployments
        run: |
          DEPLOYMENTS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/deployments")
          
          LATEST_ID=$(echo "$DEPLOYMENTS" | jq -r 'sort_by(.created_at) | last(.[]).id')
          ALL_IDS=$(echo "$DEPLOYMENTS" | jq -r '.[].id')
          
          echo "latest_id=$LATEST_ID" >> $GITHUB_OUTPUT
          echo "all_ids=$ALL_IDS" >> $GITHUB_OUTPUT
          
          echo "最新部署 ID: $LATEST_ID"
      
      - name: 删除旧的部署记录
        run: |
          LATEST_ID="${{ steps.get-deployments.outputs.latest_id }}"
          ALL_IDS="${{ steps.get-deployments.outputs.all_ids }}"
          
          for ID in $ALL_IDS; do
            if [ "$ID" != "$LATEST_ID" ]; then
              echo "正在删除旧的部署 ID: $ID"
              curl -X DELETE \
                -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                "https://api.github.com/repos/${{ github.repository }}/deployments/$ID"
              echo ""
            fi
          done
          
          echo "清理完成，保留了最新的部署 ID: $LATEST_ID"
